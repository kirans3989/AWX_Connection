---
- name: Port Connectivity Test
  hosts: localhost
  gather_facts: yes
  vars:
    report_file: "/tmp/port_connectivity_report.csv"
    artifactory_url: "http://54.235.15.30:8082"
    artifactory_repo: "connectivity-reports"
    source_hosts:
      - 10.0.1.8
    destination_hosts:
      - 10.0.1.81
      - 10.0.1.123
      - 10.0.1.51
      - 10.0.1.101
    ports:
      - 8400
      - 8403
  tasks:
    - name: Test port connectivity
      shell: |
        curl -sv telnet://{{ item[1] }}:{{ item[2] }} --connect-timeout 5 2>&1 | grep -E "Connected|refused|timed out|failed" | head -1
      register: port_test
      ignore_errors: yes
      loop: "{{ source_hosts | product(destination_hosts) | list | map('zip', ports) | sum(start=[]) | list }}"
      loop_control:
        label: "{{ item[0] }} -> {{ item[1] }}:{{ item[2] }}"

    - name: Create CSV header
      copy:
        dest: "{{ report_file }}"
        content: "Source,Destination,Port,Status\n"

    - name: Add rows to CSV
      lineinfile:
        path: "{{ report_file }}"
        line: "{{ item.item[0] }},{{ item.item[1] }},{{ item.item[2] }},{% if item.rc == 0 and 'Connected' in item.stdout %}Success{% else %}Failed{% endif %}"
      loop: "{{ port_test.results }}"
      loop_control:
        label: "{{ item.item[0] }} -> {{ item.item[1] }}:{{ item.item[2] }}"

    - name: Display CSV content
      command: cat {{ report_file }}
      register: csv_content
      changed_when: false

    - debug:
        var: csv_content.stdout_lines

    - name: Upload CSV to Artifactory
      uri:
        url: "{{ artifactory_url }}/artifactory/{{ artifactory_repo }}/port_connectivity_{{ ansible_date_time.date }}_{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}.csv"
        method: PUT
        user: "{{ lookup('env','JFROG_USER') }}"
        password: "{{ lookup('env','JFROG_PASSWORD') }}"
        force_basic_auth: yes
        src: "{{ report_file }}"
        status_code:
          - 200
          - 201
      register: upload_result

    - name: Show upload status
      debug:
        msg: "Upload status: {{ upload_result.status }}"