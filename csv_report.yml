---
- name: Create Connectivity Report
  hosts: all
  gather_facts: no
  ignore_unreachable: yes
  tasks:
    - name: Ping host
      ping:
      register: ping_result
      ignore_errors: yes

    - name: Write SUCCESS row
      delegate_to: localhost
      lineinfile:
        path: /tmp/connectivity_report.csv
        create: yes
        line: "{{ inventory_hostname }},SUCCESS,N/A"
      when: ping_result is not failed and ping_result is not skipped

    - name: Write FAILED row
      delegate_to: localhost
      lineinfile:
        path: /tmp/connectivity_report.csv
        create: yes
        line: "{{ inventory_hostname }},FAILED,SSH or ping failed"
      when: ping_result is failed or ping_result is skipped

    - name: Show CSV record
      delegate_to: localhost
      debug:
        msg: "Written row for {{ inventory_hostname }}"