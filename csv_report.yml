---
- name: Connectivity Test
  hosts: all
  gather_facts: no
  ignore_unreachable: yes

  tasks:
    - name: Ping target hosts
      ansible.builtin.ping:
      register: ping_result
      ignore_errors: yes

    - name: Store connectivity status
      set_fact:
        connectivity_status: "{{ 'Success' if ping_result.ping is defined else 'Failed' }}"

- name: Generate CSV and Upload to Artifactory
  hosts: localhost
  gather_facts: yes

  vars:
    report_file: "/home/ubuntu/connectivity_report.csv"
    artifactory_url: "http://54.235.15.30:8082"
    artifactory_repo: "connectivity-reports"

  tasks:

    - name: Create CSV header
      copy:
        dest: "{{ report_file }}"
        content: "Hostname,Status\n"

    - name: Append connectivity results
      lineinfile:
        path: "{{ report_file }}"
        line: "{{ item }},{{ hostvars[item].connectivity_status | default('Unreachable') }}"
        insertafter: EOF
      loop: "{{ groups['all'] }}"
      when: item != 'localhost'

    - name: Verify CSV file exists
      stat:
        path: "{{ report_file }}"
      register: csv_stat

    - name: Display CSV status
      debug:
        var: csv_stat.stat

    - name: Upload CSV to Artifactory
      uri:
        url: "{{ artifactory_url }}/artifactory/{{ artifactory_repo }}/connectivity_report_{{ ansible_date_time.date }}_{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}.csv"
        method: PUT
        headers:
          Authorization: "Bearer {{ lookup('env','JFROG_ACCESS_TOKEN') }}"
          Content-Type: "text/csv"
        src: "{{ report_file }}"
        status_code:
          - 200
          - 201
      register: upload_result

    - name: Display upload result
      debug:
        msg:
          - "Upload Status: {{ upload_result.status }}"
          - "CSV File: {{ report_file }}"