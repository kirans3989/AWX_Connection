---
- name: Load hosts from file
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Add hosts from servers.txt
      add_host:
        name: "{{ item }}"
        groups: dynamic_hosts
      loop: "{{ lookup('file', 'servers.txt').splitlines() | select('match', '^[0-9]') | list }}"

- name: Connectivity Test
  hosts: dynamic_hosts
  gather_facts: no
  ignore_unreachable: yes
  tasks:
    - name: Run connectivity test
      ansible.builtin.ping:
      register: ping_result
      ignore_errors: yes

    - name: Check port 22
      wait_for:
        host: "{{ inventory_hostname }}"
        port: 22
        timeout: 5
        state: started
      register: port_result
      ignore_errors: yes
      delegate_to: localhost

- name: Generate CSV and Upload to Artifactory
  hosts: localhost
  gather_facts: yes
  vars:
    report_file: "/tmp/connectivity_report.csv"
    artifactory_url: "http://54.235.15.30:8082"
    artifactory_repo: "connectivity-reports"
  tasks:
    - name: Generate CSV report
      copy:
        dest: "{{ report_file }}"
        content: |
          Hostname,Port,Status
          {% for host in groups['dynamic_hosts'] %}{{ host }},22,{% if hostvars[host].ping_result is defined and hostvars[host].ping_result.ping is defined %}Success{% else %}Unreachable{% endif %}
          {% endfor %}

    - name: Upload CSV to Artifactory
      uri:
        url: "{{ artifactory_url }}/artifactory/{{ artifactory_repo }}/connectivity_report_{{ ansible_date_time.date }}_{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}.csv"
        method: PUT
        user: "{{ lookup('env','JFROG_USER') }}"
        password: "{{ lookup('env','JFROG_PASSWORD') }}"
        force_basic_auth: yes
        src: "{{ report_file }}"
        status_code:
          - 200
          - 201
      register: upload_result

    - name: Show upload status
      debug:
        msg: "Upload status: {{ upload_result.status }}"

    - name: Display CSV content
      command: cat {{ report_file }}
      register: csv_content
      changed_when: false

    - debug:
        var: csv_content.stdout_lines