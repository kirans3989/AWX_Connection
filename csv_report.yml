---
- name: Connectivity Test
  hosts: all
  gather_facts: no
  ignore_unreachable: yes

  tasks:
    - name: Run connectivity test
      ansible.builtin.ping:
      register: ping_result
      ignore_errors: yes

- name: Generate CSV and Upload to Artifactory
  hosts: localhost
  gather_facts: yes

  vars:
    report_file: "/home/ubuntu/connectivity_report.csv"
    artifactory_url: "http://54.235.15.30:8082"
    artifactory_repo: "connectivity-reports"

  tasks:

    - name: Generate CSV report
      copy:
        dest: "{{ report_file }}"
        content: |
          Hostname,Status
          {% for host in groups['all'] %}
          {{ host }},{% if hostvars[host].ping_result is defined and hostvars[host].ping_result.ping is defined %}Success{% else %}Unreachable{% endif %}
          {% endfor %}

    - name: Verify CSV exists
      stat:
        path: "{{ report_file }}"
      register: csv_file

    - name: Display CSV status
      debug:
        var: csv_file.stat

    - name: Display CSV content
      command: cat {{ report_file }}
      register: csv_content
      changed_when: false

    - debug:
        var: csv_content.stdout_lines

    - name: Verify token injection
      debug:
        msg: "Token Length={{ lookup('env','JFROG_ACCESS_TOKEN') | length }}"

    - name: Upload CSV to Artifactory
      uri:
        url: "{{ artifactory_url }}/artifactory/{{ artifactory_repo }}/connectivity_report_{{ ansible_date_time.date }}_{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}.csv"
        method: PUT
        headers:
          Authorization: "Bearer {{ lookup('env','JFROG_ACCESS_TOKEN') }}"
          Content-Type: "text/csv"
        src: "{{ report_file }}"
        status_code:
          - 200
          - 201
      register: upload_result

    - name: Upload result
      debug:
        var: upload_result.status