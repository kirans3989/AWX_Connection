- name: Generate CSV Report
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Build CSV content
      set_fact:
        csv_content: |
          Hostname,Status,Notes
          {% for host in groups['all'] %}
          {{ hostvars[host].get('csv_line', host + ',UNREACHABLE,No data collected') }}
          {% endfor %}

    - name: Show CSV in AWX output
      debug:
        msg: "{{ csv_content.split('\n') }}"