---
- name: Create Connectivity Report
  hosts: all
  gather_facts: no
  ignore_unreachable: yes
  tasks:
    - name: Ping host
      ping:
      register: ping_result
      ignore_errors: yes

    - name: Set result fact
      set_fact:
        csv_line: >-
          {{ inventory_hostname }},
          {{ 'SUCCESS' if (ping_result is defined and ping_result is not failed) else 'FAILED' }},
          {{ 'N/A' if (ping_result is defined and ping_result is not failed) else 'SSH or ping failed' }}

- name: Generate CSV Report
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Write CSV header
      lineinfile:
        path: /tmp/connectivity_report.csv
        create: yes
        line: "Hostname,Status,Notes"
        insertbefore: BOF

    - name: Write all rows
      lineinfile:
        path: /tmp/connectivity_report.csv
        line: "{{ hostvars[item]['csv_line'] }}"
      loop: "{{ groups['all'] }}"

    - name: Print full CSV report
      command: cat /tmp/connectivity_report.csv
      register: csv_output

    - name: Show CSV in AWX output
      debug:
        msg: "{{ csv_output.stdout_lines }}"