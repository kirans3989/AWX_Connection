---
- name: Create Connectivity Report
  hosts: all
  gather_facts: no
  ignore_unreachable: yes
  tasks:
    - name: Ping host
      ping:
      register: ping_result
      ignore_errors: yes

    - name: Set SUCCESS fact
      set_fact:
        csv_line: "{{ inventory_hostname }},SUCCESS,N/A"
      when:
        - ping_result is defined
        - ping_result is not failed

    - name: Set UNREACHABLE fact
      set_fact:
        csv_line: "{{ inventory_hostname }},UNREACHABLE,SSH connection failed"
      when: ping_result is not defined

- name: Generate and Upload CSV Report
  hosts: localhost
  gather_facts: yes
  vars:
    artifactory_url: "http://98.84.183.28:8082"
    artifactory_repo: "connectivity-reports"
    artifactory_token: "{{ artifactory_token }}"

  tasks:
    - name: Build CSV content
      set_fact:
        csv_content: |
          Hostname,Status,Notes
          {% for host in groups['all'] %}
          {{ hostvars[host].get('csv_line', host + ',UNREACHABLE,No data collected') }}
          {% endfor %}

    - name: Save CSV locally
      copy:
        dest: /tmp/connectivity_report.csv
        content: "{{ csv_content }}"

    - name: Upload CSV to JFrog Artifactory
      uri:
        url: "{{ artifactory_url }}/artifactory/{{ artifactory_repo }}/connectivity_report_{{ ansible_date_time.date }}_{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}.csv"
        method: PUT
        headers:
          Authorization: "Bearer {{ artifactory_token }}"
        src: /tmp/connectivity_report.csv
        status_code: 201
      register: upload_result

    - name: Show upload status
      debug:
        msg: "CSV uploaded successfully to Artifactory: {{ artifactory_url }}/artifactory/{{ artifactory_repo }}/"

    - name: Show CSV in AWX output
      debug:
        msg: "{{ csv_content.split('\n') }}"