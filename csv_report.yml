---
- name: Create Connectivity Report
  hosts: all
  gather_facts: no
  ignore_unreachable: yes
  tasks:
    - name: Ping host
      ping:
      register: ping_result
      ignore_errors: yes

    - name: Set SUCCESS fact
      set_fact:
        csv_line: "{{ inventory_hostname }},SUCCESS,N/A"
      when:
        - ping_result is defined
        - ping_result is not failed

    - name: Set UNREACHABLE fact
      set_fact:
        csv_line: "{{ inventory_hostname }},UNREACHABLE,SSH connection failed"
      when: ping_result is not defined

- name: Generate CSV Report
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Build CSV content
      set_fact:
        csv_content: |
          Hostname,Status,Notes
          {% for host in groups['all'] %}
          {{ hostvars[host].get('csv_line', host + ',UNREACHABLE,No data collected') }}
          {% endfor %}

    - name: Show CSV in AWX output
      debug:
        msg: "{{ csv_content.split('\n') }}"