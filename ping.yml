---
- name: Connectivity Check
  hosts: all
  gather_facts: no

  tasks:

    - name: Test connectivity
      ping:
      register: ping_result
      ignore_unreachable: yes
      ignore_errors: yes

    - name: Create CSV line for success
      delegate_to: localhost
      lineinfile:
        path: /tmp/connectivity_report.csv
        create: yes
        line: "{{ inventory_hostname }},SUCCESS,N/A"
      when: ping_result is succeeded

    - name: Create CSV line for failure
      delegate_to: localhost
      lineinfile:
        path: /tmp/connectivity_report.csv
        create: yes
        line: "{{ inventory_hostname }},FAILED,{{ ping_result.msg | default('Unknown Error') }}"
      when: ping_result is failed